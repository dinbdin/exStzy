<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Вход — Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Кастомные стили -->
    <link href="css/styles.css" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="card-custom card-custom-center">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Корочки.есть</h2>
            <p class="text-muted">Вход в систему</p>
        </div>

        <div class="alert alert-custom alert-dismissible fade show" role="alert">
            <strong>Ошибка!</strong> Неверный логин или пароль.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form>
            <div class="mb-3">
                <label for="loginInput" class="form-label fw-semibold">Логин</label>
                <input type="text" class="form-control" id="loginInput" placeholder="Введите ваш логин" value="user123">
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label fw-semibold">Пароль</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль" value="123456">
            </div>
            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary-custom btn-lg">Войти</button>
            </div>

            <div class="text-center">
                <a href="admin.html" class="link-custom">Админ</a>
            </div> 

            <div class="text-center">
                <a href="profile.html" class="link-custom">В профиль - для пользователя</a>
            </div> 

            <div class="text-center">
                <a href="register.html" class="link-custom">Еще не зарегистрированы? Регистрация</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
