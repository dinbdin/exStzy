<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Новая заявка — Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="card-custom" style="max-width: 700px; margin: 0 auto;">
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="profile.html">Мои заявки</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Новая заявка</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Выйти</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <h3 class="mb-4">Формирование новой заявки</h3>

        
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Успешно!</strong> Ваша заявка отправлена.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form>
            <div class="mb-3">
                <label for="courseName" class="form-label fw-semibold">Наименование курса</label>
                <input type="text" class="form-control" id="courseName" placeholder="Введите название курса" value="Продвинутый JavaScript">
            </div>

            <div class="mb-3">
                <label for="startDate" class="form-label fw-semibold">Желаемая дата начала обучения</label>
                <input type="date" class="form-control" id="startDate" value="2026-12-01">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Способ оплаты</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" id="cash" checked>
                    <label class="form-check-label" for="cash">Наличными</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" id="phoneTransfer">
                    <label class="form-check-label" for="phoneTransfer">Перевод по номеру телефона</label>
                </div>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-primary-custom btn-lg flex-grow-1">Отправить заявку</button>
                <a href="profile.html" class="btn btn-outline-secondary btn-lg">Отмена</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
