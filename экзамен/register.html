<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Регистрация — Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="card-custom" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Корочки.есть</h2>
            <p class="text-muted">Создание аккаунта</p>
        </div>

        <div class="alert alert-custom alert-dismissible fade show" role="alert">
            <strong>Ошибка!</strong> Пожалуйста, исправьте выделенные поля.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <strong>Внимание!</strong> Логин "user123" уже занят.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form>
            <div class="mb-3">
                <label for="fioInput" class="form-label fw-semibold">ФИО (кириллица)</label>
                <input type="text" class="form-control" id="fioInput" placeholder="Иванов Иван Иванович" value="Иванов Иван Иванович">
            </div>
            <div class="mb-3">
                <label for="phoneInput" class="form-label fw-semibold">Телефон</label>
                <input type="tel" class="form-control" id="phoneInput" placeholder="8(XXX)XXX-XX-XX" value="8(999)123-45-67">
                <div class="text-muted-error">Пример: 8(999)123-45-67</div>
            </div>
            <div class="mb-3">
                <label for="emailInput" class="form-label fw-semibold">Электронная почта</label>
                <input type="email" class="form-control" id="emailInput" placeholder="example@mail.ru" value="ivan@mail.ru">
            </div>
            <div class="mb-3">
                <label for="loginInput" class="form-label fw-semibold">Логин (латиница и цифры, мин. 6 символов)</label>
                <input type="text" class="form-control is-invalid" id="loginInput" placeholder="user123" value="user123">
                <div class="invalid-feedback">Этот логин уже занят.</div>
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label fw-semibold">Пароль (мин. 8 символов)</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль" value="password123">
            </div>
            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary-custom btn-lg">Зарегистрироваться</button>
            </div>
            <div class="text-center">
                <a href="index.html" class="link-custom">Уже есть аккаунт? Войти</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
